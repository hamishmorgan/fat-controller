#:schema https://mise.jdx.dev/schema/mise.json

[tools]
go = "1.26"
golangci-lint = "2.10.1"
"npm:markdownlint-cli2" = "0.21.0"
"npm:prettier" = "3.8.1"
taplo = "0.10.0"
actionlint = "1.7.11"
gitleaks = "8.30.0"
apollo-rover = "0.37.2"

[settings]
experimental = true
task.output = "keep-order"
task.source_freshness_hash_contents = true

[hooks]
postinstall = "mise run setup"

[env]
_.file = [{ path = '{{config_root}}/.config/mise/.env.local', redact = true }]

# ---------------------------------------------------------------------------
# Setup
# ---------------------------------------------------------------------------

[tasks.setup]
description = "Set up local development environment"
depends = ["setup:hooks"]

[tasks."setup:hooks"]
description = "Install git hooks"
hide = true
sources = [".config/mise/config.toml"]
outputs = [".git/hooks/pre-commit", ".git/hooks/pre-push"]
run = """
mise generate git-pre-commit --write --task=pre-commit
mise generate git-pre-commit --write --task=pre-push --hook=pre-push
"""

# ---------------------------------------------------------------------------
# Git hooks (not intended to be run directly)
# ---------------------------------------------------------------------------

[tasks.pre-commit]
description = "Git pre-commit: format, scan for secrets, and abort if files changed"
hide = true
depends = ["lint:secrets:staged"]
run = """
staged_files=$(git diff --name-only --cached --diff-filter=ACMR)

if [ -n "$staged_files" ]; then
  md_files=""
  json_files=""
  yaml_files=""
  graphql_files=""
  toml_files=""

  for file in $staged_files; do
    case "$file" in
      *.md) md_files="$md_files $file" ;;
      *.json|*.jsonc) json_files="$json_files $file" ;;
      *.yml|*.yaml) yaml_files="$yaml_files $file" ;;
      *.graphql|*.gql) graphql_files="$graphql_files $file" ;;
      *.toml) toml_files="$toml_files $file" ;;
    esac
  done

  if [ -n "$md_files" ]; then
    markdownlint-cli2 --config .config/.markdownlint-cli2.jsonc --fix $md_files
  fi

  if [ -n "$json_files" ]; then
    prettier --write $json_files --ignore-path .gitignore
  fi

  if [ -n "$yaml_files" ]; then
    prettier --write $yaml_files --ignore-path .gitignore
  fi

  if [ -n "$graphql_files" ]; then
    prettier --write $graphql_files --ignore-path .gitignore
  fi

  if [ -n "$toml_files" ]; then
    taplo format $toml_files
  fi

  if [ -n "$(git diff --name-only -- $staged_files)" ]; then
    echo "Pre-commit formatters modified staged files. Stage the changes and commit again."
    exit 1
  fi
fi
"""

[tasks.pre-push]
description = "Git pre-push: run all checks"
hide = true
depends = ["check"]

# ---------------------------------------------------------------------------
# Aggregate tasks
# ---------------------------------------------------------------------------

[tasks.lint]
description = "Run all linters"
depends = [
  "lint:md",
  "lint:json",
  "lint:graphql",
  "lint:toml",
  "lint:yaml",
  "lint:go",
  "lint:actions",
  "lint:secrets",
]

[tasks.check]
alias = ["chk", "c"]
description = "Run all linters and checks"
depends = ["lint", "test", "build"]

[tasks.format]
alias = ["fmt", "f"]
description = "Run all fixers/formatters"
depends = [
  "lint:md:fix",
  "lint:json:fix",
  "lint:graphql:fix",
  "lint:toml:fix",
  "lint:yaml:fix",
]

# ---------------------------------------------------------------------------
# Markdown
# ---------------------------------------------------------------------------

[tasks."lint:md"]
description = "Lint markdown files"
run = "markdownlint-cli2 --config .config/.markdownlint-cli2.jsonc '**/*.md' '#node_modules'"

[tasks."lint:md:fix"]
description = "Format markdown files"
run = "markdownlint-cli2 --config .config/.markdownlint-cli2.jsonc --fix '**/*.md' '#node_modules'"

# ---------------------------------------------------------------------------
# JSON
# ---------------------------------------------------------------------------

[tasks."lint:json"]
description = "Check JSON formatting"
run = "prettier --check '**/*.{json,jsonc}' --ignore-path .gitignore"

[tasks."lint:json:fix"]
description = "Format JSON files"
run = "prettier --write '**/*.{json,jsonc}' --ignore-path .gitignore"

# ---------------------------------------------------------------------------
# GraphQL
# ---------------------------------------------------------------------------

[tasks."lint:graphql"]
description = "Check GraphQL formatting"
run = "prettier --check '**/*.{graphql,gql}' --ignore-path .gitignore"

[tasks."lint:graphql:fix"]
description = "Format GraphQL files"
run = "prettier --write '**/*.{graphql,gql}' --ignore-path .gitignore"

# ---------------------------------------------------------------------------
# TOML
# ---------------------------------------------------------------------------

[tasks."lint:toml"]
description = "Lint TOML files"
run = "taplo check"

[tasks."lint:toml:fix"]
description = "Format TOML files"
run = "taplo format"

# ---------------------------------------------------------------------------
# YAML
# ---------------------------------------------------------------------------

[tasks."lint:yaml"]
description = "Check YAML formatting"
run = "prettier --check '**/*.{yml,yaml}' --ignore-path .gitignore"

[tasks."lint:yaml:fix"]
description = "Format YAML files"
run = "prettier --write '**/*.{yml,yaml}' --ignore-path .gitignore"

# ---------------------------------------------------------------------------
# GitHub Actions
# ---------------------------------------------------------------------------

[tasks."lint:actions"]
description = "Lint GitHub Actions workflows"
run = "actionlint"

# ---------------------------------------------------------------------------
# Secrets
# ---------------------------------------------------------------------------

[tasks."lint:secrets"]
description = "Scan for secrets in the repo"
run = "gitleaks detect --verbose"

[tasks."lint:secrets:staged"]
description = "Scan staged changes for secrets"
hide = true
run = "gitleaks protect --verbose --staged"

# ---------------------------------------------------------------------------
# GraphQL Schema
# ---------------------------------------------------------------------------

[tasks."schema:introspect"]
alias = ["introspect"]
env = { RAILWAY_API_TOKEN = { required = true, redact = true } }
description = "Fetch Railway GraphQL schema via introspection (requires RAILWAY_API_TOKEN)"
run = """
rover graph introspect https://backboard.railway.com/graphql/v2 \
  --header "Authorization:Bearer ${RAILWAY_API_TOKEN:?Set RAILWAY_API_TOKEN to introspect the schema}" \
  --output internal/railway/schema.graphql
"""

[tasks."schema:voyager"]
alias = ["voyager"]
description = "Build and open an interactive graphql-voyager diagram of the Railway schema"
sources = ["internal/railway/schema.graphql"]
outputs = [".build/railway_schema_voyager.html"]
run = """
mkdir -p .build

# Install graphql npm package into a temp dir so we don't pollute the project.
NPMDIR=$(mktemp -d)
trap 'rm -rf "$NPMDIR"' EXIT
npm install --prefix "$NPMDIR" --silent graphql

node .config/mise/schema-voyager.mjs "$NPMDIR"
echo "Opening .build/railway_schema_voyager.html"
xdg-open .build/railway_schema_voyager.html 2>/dev/null || open .build/railway_schema_voyager.html 2>/dev/null || true
"""

# ---------------------------------------------------------------------------
# Go
# ---------------------------------------------------------------------------

[tasks.generate]
alias = ["gen"]
description = "Run Go code generation (genqlient)"
run = """
[ -f go.mod ] || exit 0
go generate ./...
go run github.com/Khan/genqlient .config/genqlient.yaml
"""

[tasks."docs:cli"]
alias = ["docs"]
description = "Generate CLI reference Markdown from Kong model"
run = "go run ./internal/tools/docgen -out docs/cli"

[tasks."docs:logo"]
description = "Regenerate docs/logo.png from docs/logo.svg"
sources = ["docs/logo.svg"]
outputs = ["docs/logo.png"]
run = "rsvg-convert -w 512 -h 512 docs/logo.svg -o docs/logo.png"

[tasks."lint:go"]
description = "Lint Go code"
run = """
[ -f go.mod ] || exit 0
golangci-lint run
"""

[tasks.dev]
alias = ["d"]
description = "Run the CLI in dev mode"
run = "go run ./cmd/fat-controller"

[tasks.test]
description = "Run Go tests"
run = """
[ -f go.mod ] || exit 0
go test -race ./...
"""

[tasks."test:fresh"]
alias = ["tf"]
description = "Run Go tests (no cache)"
run = """
[ -f go.mod ] || exit 0
go test -count=1 -race ./...
"""

[tasks."test:e2e"]
description = "Run mocked E2E integration tests"
run = """
[ -f go.mod ] || exit 0
go test -v -count=1 -race -run TestCLIE2E ./internal/cli
"""

[tasks."test:coverage"]
alias = ["cover", "cov"]
description = "Run tests with coverage and open HTML report"
run = """
[ -f go.mod ] || exit 0
mkdir -p .build/coverage
go test -race -coverprofile=.build/coverage/coverage.out ./...
go tool cover -func=.build/coverage/coverage.out
go tool cover -html=.build/coverage/coverage.out -o .build/coverage/coverage.html
echo ""
echo "HTML report: .build/coverage/coverage.html"
"""

[tasks.build]
description = "Build Go binary"
run = """
[ -f go.mod ] || exit 0
mkdir -p .build
VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
LDFLAGS="-s -w -X github.com/hamishmorgan/fat-controller/internal/version.version=${VERSION} -X github.com/hamishmorgan/fat-controller/internal/version.commit=${COMMIT} -X github.com/hamishmorgan/fat-controller/internal/version.date=${DATE}"
go build -ldflags "${LDFLAGS}" -o .build/fat-controller ./cmd/fat-controller
"""

[tasks."deps:update"]
description = "Update Go module dependencies"
run = """
[ -f go.mod ] || exit 0
go get -u ./...
go mod tidy
"""

[tasks."deps:list"]
description = "List available Go module updates"
run = """
[ -f go.mod ] || exit 0
go list -m -u all
"""

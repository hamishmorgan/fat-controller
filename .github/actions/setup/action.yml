name: Setup
description: Checkout repository and install tools via mise

inputs:
  fetch-depth:
    description: Number of commits to fetch (0 for full history)
    default: "1"

runs:
  using: composite
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
    - uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d # v3.6.2

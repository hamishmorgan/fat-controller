name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CGO_ENABLED: "0"
  GOTOOLCHAIN: local

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - &checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - &mise
        uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d # v3.6.2
      - name: Run tests with coverage
        env:
          CGO_ENABLED: "1"
        run: |
          mkdir -p .build/coverage
          go test -race -coverprofile=.build/coverage/coverage.out ./...
      - name: Print coverage summary
        run: go tool cover -func=.build/coverage/coverage.out
      - name: Check coverage threshold
        run: |
          total=$(go tool cover -func=.build/coverage/coverage.out | grep ^total: | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${total}%"
          threshold=40
          if [ "$(echo "${total} < ${threshold}" | bc)" -eq 1 ]; then
            echo "::error::Coverage ${total}% is below threshold ${threshold}%"
            exit 1
          fi
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: .build/coverage/coverage.out

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.26"]
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - *checkout
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ matrix.go-version }}
      - name: Build for ${{ matrix.go-version }} ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o /dev/null ./cmd/fat-controller

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - *mise
      - name: Build binary
        run: mise run build
      - name: Smoke test --version
        run: .build/fat-controller --version
      - name: Smoke test --help
        run: .build/fat-controller --help

  vulncheck:
    runs-on: ubuntu-latest
    # Non-blocking: the Go vuln DB sometimes has incorrect version ranges
    # (e.g. GO-2026-4599, GO-2026-4600 are 1.26-only but marked as affecting all versions).
    continue-on-error: true
    steps:
      - *checkout
      - *mise
      - run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  mod-tidy:
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - *mise
      - name: Check go.mod and go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || {
            echo "::error::go.mod or go.sum are not tidy. Run 'go mod tidy' and commit the result."
            exit 1
          }

  license-check:
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - *mise
      - name: Check dependency licenses
        run: go run github.com/google/go-licenses@latest check --allowed_licenses=Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MIT,MPL-2.0 ./...

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - *mise
      - run: mise run lint:go

  lint-md:
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - *mise
      - run: mise run lint:md

  lint-json:
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - *mise
      - run: mise run lint:json

  lint-graphql:
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - *mise
      - run: mise run lint:graphql

  lint-toml:
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - *mise
      - run: mise run lint:toml

  lint-yaml:
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - *mise
      - run: mise run lint:yaml

  docs-freshness:
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - *mise
      - name: Validate example config against schema
        run: taplo check --schema "file://$(pwd)/docs/fat-controller.schema.json" docs/fat-controller.example.toml
      - name: Check CLI reference docs are up to date
        run: |
          mise run docs:cli
          git diff --exit-code docs/cli/ || {
            echo "::error::CLI reference docs are stale. Run 'mise run docs:cli' and commit the result."
            exit 1
          }

  lint-actions:
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - *mise
      - run: mise run lint:actions

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - *mise
      - run: mise run lint:secrets

name: Lint Docs

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run lint:md
      - run: mise run lint:json
      - run: mise run lint:graphql
      - run: mise run lint:toml
      - run: mise run lint:yaml

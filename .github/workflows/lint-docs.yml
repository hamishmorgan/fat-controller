name: Lint Docs

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run lint:md
      - run: mise run lint:json
      - run: mise run lint:graphql
      - run: mise run lint:toml
      - run: mise run lint:yaml
      - name: Validate example config against schema
        run: taplo check --schema "file://$(pwd)/docs/fat-controller.schema.json" docs/fat-controller.example.toml
      - name: Check CLI reference docs are up to date
        run: |
          mise run docs:cli
          git diff --exit-code docs/cli/ || {
            echo "::error::CLI reference docs are stale. Run 'mise run docs:cli' and commit the result."
            exit 1
          }

name: Test

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d # v3.6.2
      - name: Run tests with coverage
        run: |
          mkdir -p .build/coverage
          go test -race -coverprofile=.build/coverage/coverage.out ./...
      - name: Print coverage summary
        run: go tool cover -func=.build/coverage/coverage.out
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: .build/coverage/coverage.out

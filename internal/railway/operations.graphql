# ---------------------------------------------------------------------------
# Live-state queries (environment-wide + per-service fallbacks)
# ---------------------------------------------------------------------------

# Fetches service instances, deployment triggers, volume instances, and
# private networks in one round-trip (replaces 4 separate HTTP requests).
query EnvironmentBulk($environmentId: String!, $projectId: String) {
  # @genqlient(typename: "BulkEnvironment")
  environment(id: $environmentId, projectId: $projectId) {
    # @genqlient(typename: "BulkServiceInstances")
    serviceInstances(first: 200) {
      # @genqlient(typename: "BulkServiceInstanceEdge")
      edges {
        # @genqlient(typename: "BulkServiceInstance")
        node {
          ...ServiceInstanceFields
        }
      }
    }
    # @genqlient(typename: "BulkTriggers")
    deploymentTriggers(first: 1000) {
      # @genqlient(typename: "BulkTriggerEdge")
      edges {
        # @genqlient(typename: "BulkTrigger")
        node {
          ...DeploymentTriggerFields
        }
      }
    }
    # @genqlient(typename: "BulkVolumeInstances")
    volumeInstances(first: 100) {
      # @genqlient(typename: "BulkVolumeInstanceEdge")
      edges {
        # @genqlient(typename: "BulkVolumeInstance")
        node {
          ...VolumeInstanceFields
        }
      }
    }
  }
  # @genqlient(typename: "BulkPrivateNetwork")
  privateNetworks(environmentId: $environmentId) {
    ...PrivateNetworkFields
  }
}

# Per-service fallback when EnvironmentBulk data is unavailable.
query ServiceInstance($environmentId: String!, $serviceId: String!) {
  # @genqlient(typename: "FetchedServiceInstance")
  serviceInstance(environmentId: $environmentId, serviceId: $serviceId) {
    ...ServiceInstanceFields
  }
}

# Resource limits (merged with plan defaults).
query ServiceInstanceLimits($environmentId: String!, $serviceId: String!) {
  serviceInstanceLimits(environmentId: $environmentId, serviceId: $serviceId)
}

query TCPProxies($environmentId: String!, $serviceId: String!) {
  # @genqlient(typename: "TCPProxyItem")
  tcpProxies(environmentId: $environmentId, serviceId: $serviceId) {
    ...TCPProxyFields
  }
}

query EgressGateways($environmentId: String!, $serviceId: String!) {
  # @genqlient(typename: "EgressGatewayItem")
  egressGateways(environmentId: $environmentId, serviceId: $serviceId) {
    ...EgressGatewayFields
  }
}

query DeploymentTriggers(
  $environmentId: String!
  $projectId: String!
  $serviceId: String!
) {
  # @genqlient(typename: "TriggerList")
  deploymentTriggers(
    environmentId: $environmentId
    projectId: $projectId
    serviceId: $serviceId
    first: 100
  ) {
    # @genqlient(typename: "TriggerListEdge")
    edges {
      # @genqlient(typename: "TriggerListItem")
      node {
        ...DeploymentTriggerFields
      }
    }
  }
}

# Standalone volume/network queries — subsumed by EnvironmentBulk for the
# primary live-state path but retained for list commands and test mocks.

query EnvironmentVolumes($environmentId: String!, $projectId: String) {
  # @genqlient(typename: "EnvironmentVolumesEnv")
  environment(id: $environmentId, projectId: $projectId) {
    # @genqlient(typename: "EnvironmentVolumeList")
    volumeInstances(first: 100) {
      # @genqlient(typename: "EnvironmentVolumeEdge")
      edges {
        # @genqlient(typename: "EnvironmentVolumeItem")
        node {
          ...VolumeInstanceFields
        }
      }
    }
  }
}

query PrivateNetworks($environmentId: String!) {
  # @genqlient(typename: "PrivateNetworkItem")
  privateNetworks(environmentId: $environmentId) {
    ...PrivateNetworkFields
  }
}

# ---------------------------------------------------------------------------
# Log fetching
# ---------------------------------------------------------------------------

query DeploymentLogs(
  $deploymentId: String!
  $limit: Int
  $startDate: DateTime
  $endDate: DateTime
  $filter: String
) {
  # @genqlient(typename: "DeploymentLogEntry")
  deploymentLogs(
    deploymentId: $deploymentId
    limit: $limit
    startDate: $startDate
    endDate: $endDate
    filter: $filter
  ) {
    ...LogEntryFields
  }
}

query BuildLogs(
  $deploymentId: String!
  $limit: Int
  $startDate: DateTime
  $endDate: DateTime
  $filter: String
) {
  # @genqlient(typename: "BuildLogEntry")
  buildLogs(
    deploymentId: $deploymentId
    limit: $limit
    startDate: $startDate
    endDate: $endDate
    filter: $filter
  ) {
    ...LogEntryFields
  }
}

query EnvironmentLogs(
  $environmentId: String!
  $anchorDate: String
  $afterDate: String
  $afterLimit: Int
  $beforeDate: String
  $beforeLimit: Int
  $filter: String
) {
  # @genqlient(typename: "EnvironmentLogEntry")
  environmentLogs(
    environmentId: $environmentId
    anchorDate: $anchorDate
    afterDate: $afterDate
    afterLimit: $afterLimit
    beforeDate: $beforeDate
    beforeLimit: $beforeLimit
    filter: $filter
  ) {
    ...LogEntryFields
  }
}

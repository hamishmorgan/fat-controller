# Deployment listing
query Deployments($input: DeploymentListInput!, $first: Int, $after: String) {
  deployments(input: $input, first: $first, after: $after) {
    edges {
      node {
        id
        status
        createdAt
        staticUrl
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

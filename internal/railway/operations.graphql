# ---------------------------------------------------------------------------
# Shared fragments — reused across multiple queries to avoid field duplication
# and to produce clean, shared Go types via genqlient.
# ---------------------------------------------------------------------------

# Deploy settings and domains for a single service instance.
# Used by both the standalone ServiceInstance query (per-service fallback)
# and the EnvironmentBulk query (environment-wide batch).
fragment ServiceInstanceFields on ServiceInstance {
  serviceId
  builder
  buildCommand
  startCommand
  dockerfilePath
  rootDirectory
  healthcheckPath
  healthcheckTimeout
  cronSchedule
  numReplicas
  region
  restartPolicyType
  restartPolicyMaxRetries
  drainingSeconds
  overlapSeconds
  sleepApplication
  ipv6EgressEnabled
  watchPatterns
  preDeployCommand
  source {
    image
    repo
  }
  domains {
    customDomains {
      id
      domain
      targetPort
    }
    serviceDomains {
      id
      domain
      targetPort
      suffix
    }
  }
}

# Deployment trigger metadata.
# Used by EnvironmentBulk (env-wide) and DeploymentTriggers (per-service).
fragment DeploymentTriggerFields on DeploymentTrigger {
  id
  serviceId
  branch
  repository
  provider
  checkSuites
}

# Volume instance with its parent volume name.
# Used by EnvironmentBulk and EnvironmentVolumes.
fragment VolumeInstanceFields on VolumeInstance {
  id
  mountPath
  region
  serviceId
  volumeId
  volume {
    id
    name
  }
}

# Private network summary.
# Used by EnvironmentBulk and PrivateNetworks.
fragment PrivateNetworkFields on PrivateNetwork {
  publicId
  dnsName
  name
}

# Log entry fields shared across all log queries.
fragment LogEntryFields on Log {
  message
  severity
  timestamp
}

# Service summary (id, name, icon).
# Used by ProjectServices, ProjectsResolution, ServiceCreate, ServiceUpdate.
fragment ServiceSummaryFields on Service {
  id
  name
  icon
}

# Environment summary (id, name).
# Used by Environments, EnvironmentCreate, ProjectsResolution.
fragment EnvironmentSummaryFields on Environment {
  id
  name
}

# Project summary (id, name).
# Used by Projects, ProjectCreate, ProjectsResolution.
fragment ProjectSummaryFields on Project {
  id
  name
}

# Bucket summary (id, name).
# Used by BucketCreate, BucketUpdate, ProjectBuckets.
fragment BucketSummaryFields on Bucket {
  id
  name
}

# TCP proxy fields.
# Used by TCPProxies query and TcpProxyCreate mutation.
fragment TCPProxyFields on TCPProxy {
  id
  applicationPort
  proxyPort
  domain
}

# Egress gateway fields.
# Used by EgressGateways query and EgressGatewayAssociationCreate mutation.
fragment EgressGatewayFields on EgressGateway {
  ipv4
  region
}

# Private network endpoint fields.
# Used by PrivateNetworkEndpoint query and PrivateNetworkEndpointCreateOrGet mutation.
fragment PrivateNetworkEndpointFields on PrivateNetworkEndpoint {
  publicId
  dnsName
  serviceInstanceId
}

# S3-compatible bucket credentials.
# Used by BucketS3Credentials query.
fragment BucketCredentialFields on BucketS3CompatibleCredentials {
  accessKeyId
  bucketName
  endpoint
  region
  secretAccessKey
  urlStyle
}

# ---------------------------------------------------------------------------
# Queries
# ---------------------------------------------------------------------------

# ProjectToken resolves a project-scoped token to its project and environment IDs.
# Used by auth status and as a basic connectivity check.
query ProjectToken {
  projectToken {
    projectId
    environmentId
  }
}

# Project and environment resolution
query ApiToken {
  apiToken {
    workspaces {
      id
      name
    }
  }
}

query Projects($workspaceId: String) {
  projects(first: 100, workspaceId: $workspaceId) {
    edges {
      node {
        ...ProjectSummaryFields
      }
    }
  }
}

# Combined project resolution query: fetches projects with their environments
# and services in a single round-trip, replacing separate Projects + Environments
# + ProjectServices queries (3 HTTP requests → 1) during ResolveProjectEnvironment.
query ProjectsResolution($workspaceId: String) {
  projects(first: 100, workspaceId: $workspaceId) {
    edges {
      node {
        ...ProjectSummaryFields
        environments(first: 100) {
          edges {
            node {
              ...EnvironmentSummaryFields
            }
          }
        }
        services(first: 200) {
          edges {
            node {
              ...ServiceSummaryFields
            }
          }
        }
      }
    }
  }
}

query Environments($projectId: String!) {
  environments(projectId: $projectId, first: 100) {
    edges {
      node {
        ...EnvironmentSummaryFields
      }
    }
  }
}

# Service list for a project
query ProjectServices($projectId: String!) {
  project(id: $projectId) {
    services(first: 200) {
      edges {
        node {
          ...ServiceSummaryFields
        }
      }
    }
  }
}

# Variables (shared + service).
# With serviceId=nil returns shared variables; with serviceId returns service variables.
# unrendered=true returns source values (not interpolated).
query Variables(
  $projectId: String!
  $environmentId: String!
  $serviceId: String
) {
  variables(
    projectId: $projectId
    environmentId: $environmentId
    serviceId: $serviceId
    unrendered: true
  )
}

# Service deploy settings (per-service fallback; see EnvironmentBulk for batch path)
query ServiceInstance($environmentId: String!, $serviceId: String!) {
  serviceInstance(environmentId: $environmentId, serviceId: $serviceId) {
    ...ServiceInstanceFields
  }
}

# Service resource limits (merged, includes plan defaults)
query ServiceInstanceLimits($environmentId: String!, $serviceId: String!) {
  serviceInstanceLimits(environmentId: $environmentId, serviceId: $serviceId)
}

# Mutations for set/delete
mutation VariableUpsert($input: VariableUpsertInput!) {
  variableUpsert(input: $input)
}

mutation VariableDelete($input: VariableDeleteInput!) {
  variableDelete(input: $input)
}

# serviceInstanceUpdate takes serviceId as a top-level argument, not inside the input.
mutation ServiceInstanceUpdate(
  $serviceId: String!
  $input: ServiceInstanceUpdateInput!
) {
  serviceInstanceUpdate(serviceId: $serviceId, input: $input)
}

mutation VariableCollectionUpsert($input: VariableCollectionUpsertInput!) {
  variableCollectionUpsert(input: $input)
}

mutation ServiceInstanceLimitsUpdate(
  $input: ServiceInstanceLimitsUpdateInput!
) {
  serviceInstanceLimitsUpdate(input: $input)
}


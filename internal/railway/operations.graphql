# ---------------------------------------------------------------------------
# Shared fragments — reused across queries/mutations to avoid field
# duplication and to produce clean, shared Go types via genqlient.
# ---------------------------------------------------------------------------

# -- Entity summaries (id + display fields) --------------------------------

fragment ProjectSummaryFields on Project {
  id
  name
}

fragment EnvironmentSummaryFields on Environment {
  id
  name
}

fragment ServiceSummaryFields on Service {
  id
  name
  icon
}

fragment BucketSummaryFields on Bucket {
  id
  name
}

fragment VolumeSummaryFields on Volume {
  id
  name
}

fragment WorkspaceFields on ApiTokenWorkspace {
  id
  name
}

fragment DeploymentSummaryFields on Deployment {
  id
  status
  createdAt
  staticUrl
}

# -- Sub-resource fields ---------------------------------------------------

fragment DeploymentTriggerFields on DeploymentTrigger {
  id
  serviceId
  branch
  repository
  provider
  checkSuites
}

fragment VolumeInstanceFields on VolumeInstance {
  id
  mountPath
  region
  serviceId
  volumeId
  volume {
    ...VolumeSummaryFields
  }
}

fragment TCPProxyFields on TCPProxy {
  id
  applicationPort
  proxyPort
  domain
}

fragment EgressGatewayFields on EgressGateway {
  ipv4
  region
}

fragment PrivateNetworkFields on PrivateNetwork {
  publicId
  dnsName
  name
}

fragment PrivateNetworkEndpointFields on PrivateNetworkEndpoint {
  publicId
  dnsName
  serviceInstanceId
}

fragment CustomDomainFields on CustomDomain {
  id
  domain
  targetPort
}

fragment ServiceDomainFields on ServiceDomain {
  id
  domain
  targetPort
  suffix
}

fragment LogEntryFields on Log {
  message
  severity
  timestamp
}

# -- Composite fragments ---------------------------------------------------

# Deploy settings and domains for a single service instance.
fragment ServiceInstanceFields on ServiceInstance {
  serviceId
  builder
  buildCommand
  startCommand
  dockerfilePath
  rootDirectory
  healthcheckPath
  healthcheckTimeout
  cronSchedule
  numReplicas
  region
  restartPolicyType
  restartPolicyMaxRetries
  drainingSeconds
  overlapSeconds
  sleepApplication
  ipv6EgressEnabled
  watchPatterns
  preDeployCommand
  # @genqlient(typename: "ServiceSource")
  source {
    image
    repo
  }
  # @genqlient(typename: "ServiceDomains")
  domains {
    # @genqlient(typename: "ServiceCustomDomain")
    customDomains {
      ...CustomDomainFields
    }
    # @genqlient(typename: "ServiceServiceDomain")
    serviceDomains {
      ...ServiceDomainFields
    }
  }
}

fragment BucketCredentialFields on BucketS3CompatibleCredentials {
  accessKeyId
  bucketName
  endpoint
  region
  secretAccessKey
  urlStyle
}

# ---------------------------------------------------------------------------
# Auth & resolution
# ---------------------------------------------------------------------------

# Resolve a project-scoped token to its project and environment IDs.
query ProjectToken {
  # @genqlient(typename: "TokenScope")
  projectToken {
    projectId
    environmentId
  }
}

# List workspaces visible to the current account token.
query ApiToken {
  # @genqlient(typename: "TokenContext")
  apiToken {
    # @genqlient(typename: "TokenWorkspace")
    workspaces {
      ...WorkspaceFields
    }
  }
}

# Flat project list for a workspace.
query Projects($workspaceId: String) {
  # @genqlient(typename: "ProjectList")
  projects(first: 100, workspaceId: $workspaceId) {
    # @genqlient(typename: "ProjectListEdge")
    edges {
      # @genqlient(typename: "ProjectListItem")
      node {
        ...ProjectSummaryFields
      }
    }
  }
}

# Projects with nested environments and services in a single round-trip
# (replaces separate Projects + Environments + ProjectServices calls).
query ProjectsResolution($workspaceId: String) {
  # @genqlient(typename: "ResolutionProjects")
  projects(first: 100, workspaceId: $workspaceId) {
    # @genqlient(typename: "ResolutionProjectEdge")
    edges {
      # @genqlient(typename: "ResolutionProject")
      node {
        ...ProjectSummaryFields
        # @genqlient(typename: "ResolutionEnvironments")
        environments(first: 100) {
          # @genqlient(typename: "ResolutionEnvironmentEdge")
          edges {
            # @genqlient(typename: "ResolutionEnvironment")
            node {
              ...EnvironmentSummaryFields
            }
          }
        }
        # @genqlient(typename: "ResolutionServices")
        services(first: 200) {
          # @genqlient(typename: "ResolutionServiceEdge")
          edges {
            # @genqlient(typename: "ResolutionService")
            node {
              ...ServiceSummaryFields
            }
          }
        }
      }
    }
  }
}

query Environments($projectId: String!) {
  # @genqlient(typename: "EnvironmentList")
  environments(projectId: $projectId, first: 100) {
    # @genqlient(typename: "EnvironmentListEdge")
    edges {
      # @genqlient(typename: "EnvironmentListItem")
      node {
        ...EnvironmentSummaryFields
      }
    }
  }
}

query ProjectServices($projectId: String!) {
  # @genqlient(typename: "ProjectServicesProject")
  project(id: $projectId) {
    # @genqlient(typename: "ServiceList")
    services(first: 200) {
      # @genqlient(typename: "ServiceListEdge")
      edges {
        # @genqlient(typename: "ServiceListItem")
        node {
          ...ServiceSummaryFields
        }
      }
    }
  }
}

# ---------------------------------------------------------------------------
# Entity CRUD (projects, environments, services)
# ---------------------------------------------------------------------------

mutation ProjectCreate($input: ProjectCreateInput!) {
  # @genqlient(typename: "CreatedProject")
  projectCreate(input: $input) {
    ...ProjectSummaryFields
  }
}

mutation ProjectDelete($id: String!) {
  projectDelete(id: $id)
}

mutation EnvironmentCreate($input: EnvironmentCreateInput!) {
  # @genqlient(typename: "CreatedEnvironment")
  environmentCreate(input: $input) {
    ...EnvironmentSummaryFields
  }
}

mutation EnvironmentDelete($id: String!) {
  environmentDelete(id: $id)
}

mutation ServiceCreate($input: ServiceCreateInput!) {
  # @genqlient(typename: "CreatedService")
  serviceCreate(input: $input) {
    ...ServiceSummaryFields
  }
}

mutation ServiceDelete($id: String!) {
  serviceDelete(id: $id)
}

mutation ServiceUpdate($id: String!, $input: ServiceUpdateInput!) {
  # @genqlient(typename: "UpdatedService")
  serviceUpdate(id: $id, input: $input) {
    ...ServiceSummaryFields
  }
}

mutation ServiceConnect($id: String!, $input: ServiceConnectInput!) {
  # @genqlient(typename: "ConnectedService")
  serviceConnect(id: $id, input: $input) {
    id
  }
}

# ---------------------------------------------------------------------------
# Variables
# ---------------------------------------------------------------------------

# With serviceId omitted returns shared variables; with serviceId set
# returns service-scoped variables. unrendered=true returns source values.
query Variables(
  $projectId: String!
  $environmentId: String!
  $serviceId: String
) {
  variables(
    projectId: $projectId
    environmentId: $environmentId
    serviceId: $serviceId
    unrendered: true
  )
}

mutation VariableUpsert($input: VariableUpsertInput!) {
  variableUpsert(input: $input)
}

mutation VariableDelete($input: VariableDeleteInput!) {
  variableDelete(input: $input)
}

mutation VariableCollectionUpsert($input: VariableCollectionUpsertInput!) {
  variableCollectionUpsert(input: $input)
}


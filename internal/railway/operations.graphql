# ---------------------------------------------------------------------------
# Deployments (listing + lifecycle)
# ---------------------------------------------------------------------------

query Deployments($input: DeploymentListInput!, $first: Int, $after: String) {
  # @genqlient(typename: "DeploymentList")
  deployments(input: $input, first: $first, after: $after) {
    # @genqlient(typename: "DeploymentListEdge")
    edges {
      # @genqlient(typename: "DeploymentListItem")
      node {
        ...DeploymentSummaryFields
      }
    }
    # @genqlient(typename: "DeploymentListPageInfo")
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}


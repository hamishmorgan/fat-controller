# Single environment-wide bulk query that fetches service instances, deployment
# triggers, volume instances, and private networks in one round-trip.
# Replaces the previous separate EnvironmentServiceInstances, AllDeploymentTriggers,
# EnvironmentVolumes, and PrivateNetworks queries (4 HTTP requests → 1).
query EnvironmentBulk($environmentId: String!, $projectId: String) {
  environment(id: $environmentId, projectId: $projectId) {
    serviceInstances(first: 200) {
      edges {
        node {
          ...ServiceInstanceFields
        }
      }
    }
    deploymentTriggers(first: 1000) {
      edges {
        node {
          ...DeploymentTriggerFields
        }
      }
    }
    volumeInstances(first: 100) {
      edges {
        node {
          ...VolumeInstanceFields
        }
      }
    }
  }
  privateNetworks(environmentId: $environmentId) {
    ...PrivateNetworkFields
  }
}

# Sub-resource queries for live state
query TCPProxies($environmentId: String!, $serviceId: String!) {
  tcpProxies(environmentId: $environmentId, serviceId: $serviceId) {
    ...TCPProxyFields
  }
}

query EgressGateways($environmentId: String!, $serviceId: String!) {
  egressGateways(environmentId: $environmentId, serviceId: $serviceId) {
    ...EgressGatewayFields
  }
}

query DeploymentTriggers(
  $environmentId: String!
  $projectId: String!
  $serviceId: String!
) {
  deploymentTriggers(
    environmentId: $environmentId
    projectId: $projectId
    serviceId: $serviceId
    first: 100
  ) {
    edges {
      node {
        ...DeploymentTriggerFields
      }
    }
  }
}

# NOTE: EnvironmentVolumes and PrivateNetworks were merged into the
# EnvironmentBulk query above. The standalone queries are no longer used
# by FetchLiveConfig but are kept for other callers (list commands, etc.)
# if needed in the future.

query EnvironmentVolumes($environmentId: String!, $projectId: String) {
  environment(id: $environmentId, projectId: $projectId) {
    volumeInstances(first: 100) {
      edges {
        node {
          ...VolumeInstanceFields
        }
      }
    }
  }
}

query PrivateNetworks($environmentId: String!) {
  privateNetworks(environmentId: $environmentId) {
    ...PrivateNetworkFields
  }
}

query PrivateNetworkEndpoint(
  $environmentId: String!
  $privateNetworkId: String!
  $serviceId: String!
) {
  privateNetworkEndpoint(
    environmentId: $environmentId
    privateNetworkId: $privateNetworkId
    serviceId: $serviceId
  ) {
    ...PrivateNetworkEndpointFields
  }
}

# Project-level volume listing
query ProjectVolumes($projectId: String!) {
  project(id: $projectId) {
    volumes(first: 200) {
      edges {
        node {
          id
          name
          projectId
        }
      }
    }
  }
}

# Project-level bucket listing
query ProjectBuckets($projectId: String!) {
  project(id: $projectId) {
    buckets(first: 200) {
      edges {
        node {
          ...BucketSummaryFields
          projectId
        }
      }
    }
  }
}

# Deployment listing
query Deployments($input: DeploymentListInput!, $first: Int, $after: String) {
  deployments(input: $input, first: $first, after: $after) {
    edges {
      node {
        id
        status
        createdAt
        staticUrl
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

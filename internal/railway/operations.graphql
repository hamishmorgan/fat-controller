# ProjectToken resolves a project-scoped token to its project and environment IDs.
# Used by auth status and as a basic connectivity check.
query ProjectToken {
  projectToken {
    projectId
    environmentId
  }
}

# Project and environment resolution
query ApiToken {
  apiToken {
    workspaces {
      id
      name
    }
  }
}

query Projects($workspaceId: String) {
  projects(first: 100, workspaceId: $workspaceId) {
    edges {
      node {
        id
        name
      }
    }
  }
}

query Environments($projectId: String!) {
  environments(projectId: $projectId, first: 100) {
    edges {
      node {
        id
        name
      }
    }
  }
}

# Service list for a project
query ProjectServices($projectId: String!) {
  project(id: $projectId) {
    services(first: 200) {
      edges {
        node {
          id
          name
        }
      }
    }
  }
}

# Variables (shared + service).
# With serviceId=nil returns shared variables; with serviceId returns service variables.
# unrendered=true returns source values (not interpolated).
query Variables(
  $projectId: String!
  $environmentId: String!
  $serviceId: String
) {
  variables(
    projectId: $projectId
    environmentId: $environmentId
    serviceId: $serviceId
    unrendered: true
  )
}

# Service deploy settings
query ServiceInstance($environmentId: String!, $serviceId: String!) {
  serviceInstance(environmentId: $environmentId, serviceId: $serviceId) {
    builder
    buildCommand
    startCommand
    dockerfilePath
    rootDirectory
    healthcheckPath
    healthcheckTimeout
    cronSchedule
    numReplicas
    region
    restartPolicyType
    restartPolicyMaxRetries
    drainingSeconds
    overlapSeconds
    sleepApplication
    ipv6EgressEnabled
    watchPatterns
    preDeployCommand
    source {
      image
      repo
    }
    domains {
      customDomains {
        id
        domain
        targetPort
      }
      serviceDomains {
        id
        domain
        targetPort
        suffix
      }
    }
  }
}

# Service resource limits (merged, includes plan defaults)
query ServiceInstanceLimits($environmentId: String!, $serviceId: String!) {
  serviceInstanceLimits(environmentId: $environmentId, serviceId: $serviceId)
}

# Mutations for set/delete
mutation VariableUpsert($input: VariableUpsertInput!) {
  variableUpsert(input: $input)
}

mutation VariableDelete($input: VariableDeleteInput!) {
  variableDelete(input: $input)
}

# serviceInstanceUpdate takes serviceId as a top-level argument, not inside the input.
mutation ServiceInstanceUpdate(
  $serviceId: String!
  $input: ServiceInstanceUpdateInput!
) {
  serviceInstanceUpdate(serviceId: $serviceId, input: $input)
}

mutation VariableCollectionUpsert($input: VariableCollectionUpsertInput!) {
  variableCollectionUpsert(input: $input)
}

mutation ServiceInstanceLimitsUpdate(
  $input: ServiceInstanceLimitsUpdateInput!
) {
  serviceInstanceLimitsUpdate(input: $input)
}

# Domain operations
mutation CustomDomainCreate($input: CustomDomainCreateInput!) {
  customDomainCreate(input: $input) {
    id
    domain
  }
}

mutation CustomDomainDelete($id: String!) {
  customDomainDelete(id: $id)
}

mutation ServiceDomainCreate($input: ServiceDomainCreateInput!) {
  serviceDomainCreate(input: $input) {
    id
    domain
  }
}

mutation ServiceDomainDelete($id: String!) {
  serviceDomainDelete(id: $id)
}

# Volume operations
mutation VolumeCreate($input: VolumeCreateInput!) {
  volumeCreate(input: $input) {
